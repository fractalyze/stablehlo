name: Bazel Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # Run once a day
    - cron:  '0 12 * * *'
  workflow_dispatch:

# Ensure that only a single job or workflow using the same
# concurrency group will run at a time. This would cancel
# any in-progress jobs in the same github workflow and github
# ref (e.g. refs/heads/main or refs/pull/<pr_number>/merge).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bazel-build:
    strategy:
      fail-fast: false
    runs-on: ${{ github.repository == 'openxla/stablehlo' && 'ubuntu-22.04-64core' || fromJSON('["self-hosted", "cpu"]') }}
    # TODO: Use ML OSS Artifacts docker to manage deps needs to package with cmake tooling
    # container: "us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build:latest"

    steps:
    # Checkout StableHLO with all commits in the chain
    - name: Checkout StableHLO
      uses: actions/checkout@v4
      with:
        fetch-depth: $(( ${{ github.event_name == 'pull_request' && github.event.pull_request.commits || 0 }} + 1 ))

    - name: Get LLVM Version
      id: llvm-version
      shell: bash
      run: |
        echo "version=$(cat ${{ github.workspace }}/build_tools/llvm_version.txt)" >> $GITHUB_OUTPUT

    - name: Setup Bazelisk
      uses: bazelbuild/setup-bazelisk@v3

    # On GitHub-hosted runners the workspace is ephemeral, so the bazel output
    # tree has to round-trip through the GitHub cache service.
    - name: Mount Bazel Cache
      if: github.repository == 'openxla/stablehlo'
      uses: actions/cache@v4
      with:
        path: "~/.cache/bazel"
        key: ${{ runner.os }}-stablehlo_bazelbuild-${{ hashFiles('.bazelversion', '.bazelrc', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel') }}
        restore-keys: |
          ${{ runner.os }}-stablehlo_bazelbuild-

    # Self-hosted runners keep a persistent bazel-remote server on the host
    # (content-addressed, disk-backed, shared across runs and branches).
    # Activate the checked-in CI options via .bazelrc.user — .bazelrc
    # try-imports it, so every bazel invocation in the CI scripts is covered
    # without threading a --bazelrc startup flag through each one.
    - name: Use host bazel-remote disk cache
      if: github.repository != 'openxla/stablehlo'
      shell: bash
      run: |
        cp .bazelrc.ci .bazelrc.user

    - name: Build and check docs
      shell: bash
      run: |
        ./build_tools/github_actions/ci_build_docs.sh -c

    - name: Build and Test StableHLO (Diff Only)
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        START_HASH=${{ github.event.pull_request.base.sha }}
        END_HASH=${{ github.event.pull_request.head.sha }}
        BAZEL_DIFF=/tmp/bazel-diff.jar
        # Fetch via the release API rather than the browser-download CDN: the
        # latter intermittently 504s and a bare `curl -Lo` would save the HTML
        # error page as a corrupt jar. `gh` validates the asset and --clobber
        # overwrites any stale file at the target path.
        gh release download 17.0.2 --repo Tinder/bazel-diff \
          --pattern bazel-diff_deploy.jar --output "$BAZEL_DIFF" --clobber
        ./build_tools/github_actions/ci_build_bazel.sh "$BAZEL_DIFF" "$START_HASH" "$END_HASH"

    - name: Build and Test StableHLO (All)
      if: ${{ github.event_name != 'pull_request' }}
      shell: bash
      run: |
        ./build_tools/github_actions/ci_build_bazel.sh

