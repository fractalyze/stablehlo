name: Commit Lint

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

jobs:
  lint:
    if: github.actor != 'fractalyze-dev'
    # GH-hosted: the job is a seconds-long message check with no repo build
    # deps; keeping it off the self-hosted runners means PR merges never
    # queue behind long bazel jobs for a lint verdict.
    runs-on: ubuntu-22.04
    name: Commit Lint
    permissions:
      contents: read
      pull-requests: read
    steps:
      # Hybrid mode runs fractal-commit-lint (the same tool as the local
      # pre-commit hook) over each commit against .fractal-commit-lint.toml, so
      # local and CI agree. Hybrid lints commit messages only, not the PR title.
      - name: Validate commit messages
        uses: fractalyze/github-actions/commit-lint@v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          scope_mode: hybrid
          fractal_lint_version: v0.7.0
