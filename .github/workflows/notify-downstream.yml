name: Notify Downstream

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch pin-bump to xla_fork
        env:
          GH_TOKEN: ${{ secrets.BUMPER_GH_PAT }}
        run: |
          gh api repos/fractalyze/xla_fork/dispatches \
            -f event_type=pin-bump \
            -f 'client_payload[source_repo]=stablehlo_fork' \
            -f 'client_payload[commit]=${{ github.sha }}'
