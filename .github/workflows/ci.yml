name: CI

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: [self-hosted, stablehlo]
    steps:
      - name: Checkout StableHLO
        uses: actions/checkout@v4

      - name: Run cpu `bazel test`
        run: |
          bazel --bazelrc=.bazelrc.ci test \
            --config=ci \
            //...

  pre-commit-style:
    if: github.actor != 'fractalyze-dev'
    runs-on: [self-hosted, stablehlo]
    steps:
      - name: Checkout StableHLO
        uses: actions/checkout@v4

      - name: Checkout Setup Python
        uses: actions/setup-python@v4.7.0
        with:
          python-version: "3.10"

      - name: Install cpplint
        run: pip install cpplint

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --from-ref ${{ github.event.pull_request.base.sha || 'HEAD~1' }} --to-ref HEAD
