name: Pin Bump

on:
  repository_dispatch:
    types: [pin-bump]

jobs:
  bump:
    if: github.event.client_payload.source_repo == 'prime-ir'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Bump prime-ir pin
        uses: fractalyze/github-actions/pin-bump@main
        with:
          upstream_repo: prime-ir
          upstream_commit: ${{ github.event.client_payload.commit }}
          pin_file: third_party/prime_ir/workspace.bzl
          var_prefix: PRIME_IR
          github_token: ${{ secrets.BUMPER_GH_PAT }}
